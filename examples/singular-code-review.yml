name: Singular Code Review

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  ack:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, vars.OPENCODE_REVIEW_COMMAND || '@singular-code-review'))
    runs-on: ubuntu-latest
    outputs:
      should_review: ${{ steps.dispatch.outputs.should_review || steps.ack.outputs.should_review || 'false' }}
    steps:
      - name: Mark workflow dispatch ready
        id: dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "should_review=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app-token
        if: github.event_name == 'issue_comment'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SINGULAR_CODE_REVIEW_CLIENT_ID || 'Iv23liVgvy1yaHapd0Wx' }}
          private-key: ${{ secrets.SINGULAR_CODE_REVIEW_PRIVATE_KEY }}
          permission-issues: write

      - name: Acknowledge trigger comment
        id: ack
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REVIEW_BOT_LOGIN: ${{ steps.app-token.outputs.app-slug }}[bot]
        run: |
          set -euo pipefail

          existing="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
              --jq '.[] | select(.content == "eyes" and .user.login == env.REVIEW_BOT_LOGIN) | .id'
          )"

          if [[ -n "$existing" ]]; then
            echo "should_review=false" >> "$GITHUB_OUTPUT"
            echo "trigger comment already acknowledged by ${REVIEW_BOT_LOGIN}; skipping review"
            exit 0
          fi

          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" \
            -f content='eyes' \
            --silent

          echo "should_review=true" >> "$GITHUB_OUTPUT"

  review:
    needs: ack
    if: needs.ack.outputs.should_review == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/we-are-singular/singular-code-review-agent:latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SINGULAR_CODE_REVIEW_CLIENT_ID || 'Iv23liVgvy1yaHapd0Wx' }}
          private-key: ${{ secrets.SINGULAR_CODE_REVIEW_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: read
          permission-pull-requests: write

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout PR head
        run: gh pr checkout "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number || inputs.pr_number }}

      - name: Run OpenCode reviewer
        run: /usr/local/bin/review_orchestrator.sh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number || inputs.pr_number }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL || 'opencode-go/minimax-m2.7' }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
          OPENCODE_REVIEW_COMMAND: ${{ vars.OPENCODE_REVIEW_COMMAND || '@singular-code-review' }}
          REVIEW_BOT_LOGIN: ${{ steps.app-token.outputs.app-slug }}[bot]
