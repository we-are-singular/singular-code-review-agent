name: Singular Code Review

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

permissions:
  contents: read

jobs:
  review:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, vars.OPENCODE_REVIEW_COMMAND || '@singular-code-review'))
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/we-are-singular/singular-code-review-agent:latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SINGULAR_CODE_REVIEW_CLIENT_ID || 'Iv23liVgvy1yaHapd0Wx' }}
          private-key: ${{ secrets.OPENCODE_REVIEW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: read
          permission-issues: read
          permission-pull-requests: write

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Checkout PR head
        run: gh pr checkout "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number || inputs.pr_number }}

      - name: Run OpenCode reviewer
        run: /usr/local/bin/review_orchestrator.sh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number || inputs.pr_number }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL || 'opencode-go/minimax-m2.7' }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
          OPENCODE_REVIEW_COMMAND: ${{ vars.OPENCODE_REVIEW_COMMAND || '@singular-code-review' }}
          REVIEW_BOT_LOGIN: ${{ steps.app-token.outputs.app-slug }}[bot]
