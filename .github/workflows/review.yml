name: Singular Code Review

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to review.
        required: true
        type: string
      trigger_comment_id:
        description: Issue comment ID that requested the review. Leave empty for manual or non-comment triggers.
        required: false
        type: string
        default: ""
    secrets:
      SINGULAR_CODE_REVIEW_PRIVATE_KEY:
        description: GitHub App private key used to author review comments.
        required: true
      OPENCODE_API_KEY:
        description: OpenCode Go API key.
        required: true
      CONTEXT7_API_KEY:
        description: Optional Context7 API key for higher rate limits.
        required: false

permissions:
  contents: read
  issues: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  agent:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/we-are-singular/singular-code-review-agent:latest
    steps:
      - name: Run review guard
        id: review-guard
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          TRIGGER_COMMENT_ID: ${{ inputs.trigger_comment_id }}
        run: /usr/local/bin/review_guard

      - name: Create GitHub App token
        if: steps.review-guard.outputs.should_review == 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: Iv23liVgvy1yaHapd0Wx
          private-key: ${{ secrets.SINGULAR_CODE_REVIEW_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Acknowledge review request
        if: steps.review-guard.outputs.should_review == 'true'
        id: review-request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMENT_ID: ${{ inputs.trigger_comment_id }}
          BOT_LOGIN: ${{ steps.app-token.outputs.app-slug }}[bot]
        run: /usr/local/bin/review_ack

      - name: Checkout repository
        if: steps.review-request.outputs.should_review == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Trust checkout directory
        if: steps.review-request.outputs.should_review == 'true'
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout PR head
        if: steps.review-request.outputs.should_review == 'true'
        run: gh pr checkout "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}

      - name: Provision review workspace
        if: steps.review-request.outputs.should_review == 'true'
        run: /usr/local/bin/provision.sh

      - name: Run Singular Code Review
        if: steps.review-request.outputs.should_review == 'true'
        timeout-minutes: 10
        run: /usr/local/bin/review_runner
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL || 'opencode-go/minimax-m2.7' }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
          TRIGGER_COMMENT_ID: ${{ inputs.trigger_comment_id }}

      - name: Extract review outputs and telemetry
        if: always() && steps.review-request.outputs.should_review == 'true'
        run: /usr/local/bin/review_extract --github-summary
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL || 'opencode-go/minimax-m2.7' }}
